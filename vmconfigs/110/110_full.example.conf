affinity: 0-15
agent: 1
allow-ksm: 0
balloon: 2048
boot: order=ide2;virtio0
cores: 8
cpu: host
hostpci0: mapping=host1_gpu,pcie=1,rombar=0
hostpci1: mapping=host1_wifi,pcie=1
ide2: none,media=cdrom
machine: pc-q35-9.0
memory: 16384
name: example-full
net0: virtio=52:54:00:00:00:10,bridge=vmbr0
numa: 1
ostype: l26
scsihw: virtio-scsi-single
sockets: 1
usb0: mapping=shared-keyboard
usb1: mapping=shared-mouse
vga: none
virtio0: local-lvm:vm-110-disk-0,discard=on,iothread=1,size=64G
virtio1: local-lvm:vm-110-disk-1,discard=on,iothread=1,size=256G
